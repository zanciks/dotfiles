[colors]
dimbackground = ${{xrdb:color0:{color0}}}
background = ${{xrdb:color8:{color8}}}
foreground = ${{xrdb:color15:{color15}}}
dimforeground = ${{xrdb:color7:{color7}}}
active = {active}
inactive = {inactive}
highlight = ${{xrdb:color5:{color5}}}
error = ${{xrdb:color9:{color9}}}

[bar/polybar]
bottom = true
width = 100%
height = 24pt

background = ${{colors.dimbackground}}
foreground = ${{colors.foreground}}

line-size = 3pt
label-line-color = #f00

border-size = 4pt
border-color = ${{colors.inactive}}

padding-left = 0
padding-right = 1

module-margin-left = 1
module-margin-right = 1

modules-left = xworkspaces xwindow
modules-center = 
modules-right = pulseaudio memory cpu network-base wlan date

tray-position = 
tray-padding = 2

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}


[settings]
screenchange-reload = true
pseudo-transparency = false

[global/wm]
margin-top = 5
margin-bottom = 0

; vim:ft=dosini