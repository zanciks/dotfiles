<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --theme: 0;
    }

    .circle-button {
      width: 100px;
      height: 100px;
      background-color: var(--theme = 0 ? #3498db : #2ecc71); /* Set your desired theme colors */
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button class="circle-button"></button>
</body>
</html>
