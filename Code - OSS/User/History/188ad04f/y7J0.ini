[colors]
dimbackground = ${xrdb:color0:#160a0c}
background = ${xrdb:color8:#8ba3a8}
foreground = ${xrdb:color15:#c7eaf1}
dimforeground = ${xrdb:color7:#c7eaf1}
active = #1bacc7
inactive = #137689
highlight = ${xrdb:color5:#6BDFF8}
error = ${xrdb:color9:#57AFD0}

[bar/wpgtk]
bottom = true
width = 100%
height = 25
offset-y = 0%
wm-restack = bspwm
background = ${colors.dimbackground}
foreground = ${colors.foreground}
line-size = 0
label-line-color = #f00
border-size = 0
border-color = ${colors.inactive}
padding-left = 0
padding-right = 0
module-margin-left = 0
module-margin-right = 0
modules-left = i3
modules-center = 
modules-right =  volume wlan eth battery date
tray-position = 
tray-padding = 2

[module/xwindow]
type = internal/xwindow
format = <label>
format-padding = 2

label = %title:0:40:...%
label-empty = 


[module/i3]
type = internal/i3
format = <label-mode><label-state>
index-sort = true
wrapping-scroll = false
fuzzy-matching = true

; Only show workspaces on the same output as the bar
pin-workspaces = true

label-mode-background = ${colors.highlight}
label-mode-padding = 2

label-focused = %index%
label-focused-foreground = ${colors.active}
label-focused-padding = 2
label-focused-font = 3

label-unfocused = %index%
label-unfocused-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.highlight}
label-visible-padding = 2

label-urgent = %index%
label-urgent-foreground = ${colors.highlight}
label-urgent-padding = 2
label-urgent-font = 3

[module/wlan]
type = internal/network
interface = wlp3s0
interval = 3.0

format-connected-padding = 2
format-connected = <ramp-signal> <label-connected>
label-connected = %essid%
format-connected-foreground = ${colors.active}

format-disconnected =

ramp-signal-0 = 
ramp-signal-foreground = ${colors.active}

[module/eth]
type = internal/network
interface = enp0s25
interval = 3.0

format-connected =  <label-connected>
format-connected-padding = 2
format-connected-foreground = ${colors.active}
label-connected = %local_ip%
label-connected-foreground = ${colors.foreground}


[module/date]
type = internal/date
interval = 5
date = 
time = %I:%M %p
date-alt = "%d %b %Y "
time-alt = %I:%M %p
format =  <label>
format-padding = 2
format-foreground = ${colors.active}
label = %date%%time%
label-foreground = ${colors.foreground}

[module/volume]
type = internal/alsa

format-volume = <ramp-volume> <label-volume>
format-volume-padding = 2
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-3 = 
ramp-volume-foreground = ${colors.active}
ramp-volume-0-foreground = ${colors.error}

format-muted-prefix = " "
format-muted-foreground = ${colors.error}
format-muted-font = 1
label-muted = MUT
label-muted-font = 1
format-muted-padding = 2

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 100
poll-interval = 5

format-charging =   <animation-charging> <label-charging>
format-charging-padding = 2
format-discharging-padding = 2
format-discharging = <ramp-capacity> <label-discharging>
format-full = <label-full> <ramp-capacity>
format-full-padding = 2
format-full-foreground = ${colors.active}

ramp-capacity-0 = 
ramp-capacity-1 =  
ramp-capacity-2 =  
ramp-capacity-3 = 
ramp-capacity-4 =  
ramp-capacity-foreground = ${colors.active}
ramp-capacity-0-foreground = ${colors.error}

animation-charging-foreground = ${colors.highlight}
animation-charging-framerate = 500
animation-charging-0 = 
animation-charging-1 =  
animation-charging-2 =  
animation-charging-3 = 
animation-charging-4 =  
format-charging-foreground = ${colors.highlight}
format-discharging-foreground = ${colors.active}

[settings]
screenchange-reload = true

[global/wm]
margin-top = 5
margin-bottom = 0

; vim:ft=dosini