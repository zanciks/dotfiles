<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .circle-button {
      width: 100px;
      height: 100px;
      background-color: #3498db; /* Choose your desired background color */
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    /* Optional: Add hover effect */
    .circle-button:hover {
      background-color: #2980b9; /* Adjust the hover background color */
    }
  </style>
</head>
<body>
  <button class="circle-button"></button>
</body>
</html>
